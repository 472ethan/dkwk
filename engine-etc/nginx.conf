# HTTPd configuration for engine.cs472.endfind.me.
# They are provided here transparency; I manage them
# elsewhere.

user   www;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # This should be included in your standard nginx
    # distribution; I won't include it in this file.
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # The standard extended access log format that parselog.py understands.
    # (Copied from logging.conf, now moved to plugins-*/ for modularity :D)

    # https://docs.nginx.com/nginx/admin-guide/monitoring/logging/#setting-up-the-access-log
    # sec precision: https://serverfault.com/a/1061315
    map "$time_local:$msec" $time_local_ms {
      ~(^\S+)(\s+\S+):\d+\.(\d+)$ $1.$3$2;
    }

    # Baseline access log format
    log_format ac_std '$remote_addr $remote_port "$http_host" "$remote_user" [$time_local_ms] '
                            '"$content_type" $content_length/-#$request_length '
                            '"$request" "$server_name" $server_port $server_protocol '
                            'ssl=$https $status "$sent_http_content_type" '
                            '$sent_http_content_length/$body_bytes_sent#$bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'd="$document_root" f="$request_filename" id="$request_id" rt=$request_time'
                            ;

    # Access log format for those with an upstream server (proxy_pass)
    log_format ac_uct '$remote_addr $remote_port "$http_host" "$remote_user" [$time_local_ms] '
                            '"$content_type" $content_length/-#$request_length '
                            '"$request" "$server_name" $server_port $server_protocol '
                            'ssl=$https $status "$sent_http_content_type" '
                            '$sent_http_content_length/$body_bytes_sent#$bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'd="$document_root" f="$request_filename" id="$request_id" rt=$request_time'
                            ' '
                            'u="$upstream_addr" uct=$upstream_connect_time '
                            'uht=$upstream_header_time urt=$upstream_response_time'
                            ;

    # Access log format for upstream servers themselves
    log_format ac_fwd '$remote_addr $remote_port "$http_host" "$remote_user" [$time_local_ms] '
                            '"$content_type" $content_length/-#$request_length '
                            '"$request" "$server_name" $server_port $server_protocol '
                            'ssl=$https $status "$sent_http_content_type" '
                            '$sent_http_content_length/$body_bytes_sent#$bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'd="$document_root" f="$request_filename" id="$request_id" rt=$request_time'
                            ' '
                            'fd="$http_x_request_id" '
                            'fa="$http_x_real_ip" ff="$http_x_forwarded_for" '
                            'fw="$http_forwarded" '
                            'fp="$http_x_forwarded_proto" '
                            'fh="$http_x_forwarded_host" '
                            'fn="$http_x_forwarded_port"'
                            ;

    # Access log for "pipes" (both downstream and upstream???)
    log_format ac_pip '$remote_addr $remote_port "$http_host" "$remote_user" [$time_local_ms] '
                            '"$content_type" $content_length/-#$request_length '
                            '"$request" "$server_name" $server_port $server_protocol '
                            'ssl=$https $status "$sent_http_content_type" '
                            '$sent_http_content_length/$body_bytes_sent#$bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'd="$document_root" f="$request_filename" id="$request_id" rt=$request_time'
                            ' '
                            'u="$upstream_addr" uct=$upstream_connect_time '
                            'uht=$upstream_header_time urt=$upstream_response_time'
                            ' '
                            'fd="$http_x_request_id" '
                            'fa="$http_x_real_ip" ff="$http_x_forwarded_for" '
                            'fw="$http_forwarded" '
                            'fp="$http_x_forwarded_proto" '
                            'fh="$http_x_forwarded_host" '
                            'fn="$http_x_forwarded_port"'
                            ;

    server {
        listen 80;
        listen [::]:80;
        server_name engine.cs472.endfind.me;

        location = /empty.txt {
            internal;
            root /srv/www/pub/rapidcow.org/;
        }

        location = /favicon.ico {
            root /nonexistent;
            error_page 404 /empty.txt;
            try_files $uri =404;
        }

        access_log /var/log/nginx/engine.cs472.endfind.me_access.log ac_std;
        error_log /var/log/nginx/engine.cs472.endfind.me_error.log;

        location /.well-known/acme-challenge/ {
            root /var/srv/www/acme;
            error_page 404 /empty.txt;
            try_files $uri =404;
            limit_except GET HEAD { deny all; }
        }

        location / {
            root  /srv/www/472/engine;
            index index.html;
            try_files $uri $uri.html $uri/ @backend;
        }

        location @backend {
            proxy_pass http://unix:/var/run/dkwk/asgi.sock;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $proxy_request_id;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        # This FreeBSD nginx doesn't have http v2.
        #http2 on;
        server_name engine.cs472.endfind.me;

        location = /empty.txt {
            internal;
            root /srv/www/pub/rapidcow.org/;
        }

        location = /favicon.ico {
            root /nonexistent;
            error_page 404 /empty.txt;
            try_files $uri =404;
        }

        access_log /var/log/nginx/engine.cs472.endfind.me_access.log ac_uct;
        error_log /var/log/nginx/engine.cs472.endfind.me_errors.log;
        ssl_certificate /usr/local/etc/letsencrypt/live/engine.cs472.endfind.me/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/engine.cs472.endfind.me/privkey.pem;

        location / {
            root  /srv/www/472/engine;
            index index.html;
            try_files $uri $uri.html $uri/ @backend;
        }

        location @backend {
            proxy_pass http://unix:/var/run/dkwk/asgi.sock;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $proxy_request_id;
        }
    }
}
