<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guestbook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH">
  <link href="../style.css?v=xB1sYiYb/MzQGdHy4en0YOmkkX0" rel="stylesheet" crossorigin="anonymous"
        integrity="sha384-o98g0qcRzisdoZaW+EHWwrQcsd9UKTiwVMapsHA7hCk+UWvI67+z/S4063FDfcrA">
</head>
<body>
  <nav>
    <ul>
      <li><a href="..">.</a></li>
      <li><a href="../Manual/Markup.html">Manual/Markup</a></li>
      <li><a href="../Manual/Permission.html">Manual/Permission</a></li>
      <li><a class="inactive" href="index.html">Guestbook/</a></li>
    </ul>
  </nav>

  <main>

    <!-- View pane -->
    <div id="view-section">
      <div id="wiki-content">
        <p class="text-secondary">Loading&hellip;</p>
      </div>
      <div id="view-actions">
        <button id="btn-edit" class="btn btn-sm btn-outline-secondary">Edit</button>
      </div>
    </div>

    <!-- Editor pane (hidden until Edit is clicked) -->
    <div id="edit-section" hidden>
      <div id="draft-bar" hidden>
        Unsaved draft found.
        <button id="btn-discard" class="btn btn-sm btn-warning">Discard draft</button>
      </div>
      <textarea id="editor" rows="20"></textarea>
      <div id="edit-controls">
        <button id="btn-save-draft" class="btn btn-sm btn-outline-primary">Save draft</button>
        <button id="btn-publish"    class="btn btn-sm btn-primary">Publish</button>
        <button id="btn-cancel"     class="btn btn-sm btn-outline-secondary">Cancel</button>
      </div>
      <div id="edit-status"></div>
    </div>

  </main>

  <script type="module">
    import { parse } from '../parser.js';

    const DRAFT_KEY  = 'draft:Guestbook/index';
    const BASE_URL   = '//engine.cs472.endfind.me';
    const API_READ   = new URL(BASE_URL + '/api/read?f=Guestbook/index', document.baseURI);
    const API_POST   = new URL(BASE_URL + '/api/post?f=Guestbook/index', document.baseURI);

    const viewSection = document.getElementById('view-section');
    const editSection = document.getElementById('edit-section');
    const wikiContent = document.getElementById('wiki-content');
    const editor      = document.getElementById('editor');
    const draftBar    = document.getElementById('draft-bar');
    const editStatus  = document.getElementById('edit-status');

    let currentText = '';

    function hasDraft() {
      return localStorage.getItem(DRAFT_KEY) !== null;
    }

    function syncDraftBar() {
      draftBar.hidden = !hasDraft();
    }

    async function loadContent() {
      try {
        const resp = await fetch(API_READ);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        currentText = await resp.text();
        wikiContent.innerHTML = parse(currentText);
      } catch (err) {
        const errNode = document.createElement('p');
        errNode.className = 'text-danger';
        errNode.textContent = `Error loading page: ${err.message}`;
        wikiContent.replaceChildren(errNode);
      }
    }

    document.getElementById('btn-edit').addEventListener('click', () => {
      editor.value = hasDraft() ? localStorage.getItem(DRAFT_KEY) : currentText;
      syncDraftBar();
      editStatus.textContent = hasDraft() ? 'Draft loaded from local storage.' : '';
      viewSection.hidden = true;
      editSection.hidden = false;
    });

    document.getElementById('btn-cancel').addEventListener('click', () => {
      editSection.hidden = true;
      viewSection.hidden = false;
    });

    document.getElementById('btn-save-draft').addEventListener('click', () => {
      localStorage.setItem(DRAFT_KEY, editor.value);
      syncDraftBar();
      editStatus.textContent = 'Draft saved to local storage.';
    });

    document.getElementById('btn-discard').addEventListener('click', () => {
      localStorage.removeItem(DRAFT_KEY);
      editor.value = currentText;
      syncDraftBar();
      editStatus.textContent = 'Draft discarded; reverted to published content.';
    });

    document.getElementById('btn-publish').addEventListener('click', async () => {
      editStatus.textContent = 'Publishing…';
      document.getElementById('btn-publish').disabled = true;
      try {
        const resp = await fetch(API_POST, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: editor.value }),
        });
        if (!resp.ok) {
          const payload = await resp.json().catch(() => null);
          throw new Error(payload?.detail ?? `HTTP ${resp.status}`);
        }
        localStorage.removeItem(DRAFT_KEY);
        currentText = editor.value;
        wikiContent.innerHTML = parse(currentText);
        editSection.hidden = true;
        viewSection.hidden = false;
      } catch (err) {
        editStatus.textContent = `Publish failed: ${err.message}`;
      } finally {
        document.getElementById('btn-publish').disabled = false;
      }
    });

    loadContent();
  </script>
</body>
</html>
